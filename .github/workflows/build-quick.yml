          # Patch 19: BhPerfSetupDelegate — read root_granted pref instead of running su on menu open
          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/vm/SettingItemViewModel.smali',
              '    invoke-interface {v0, v1}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    return-object v0\n'
              '.end method\n'
              '\n'
              '.method public final l()Ljava/util/List;',
              '    invoke-interface {v0, v1}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BannerHub Lite: Grant Root Access button (contentType=0x64) below Clear Cache\n'
              '    new-instance v1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;\n'
              '\n'
              '    invoke-virtual {v9}, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;->getTYPE_BTN()I\n'
              '\n'
              '    move-result v11\n'
              '\n'
              '    const/16 v12, 0x64\n'
              '\n'
              '    const/16 v15, 0xc\n'
              '\n'
              '    const/16 v16, 0x0\n'
              '\n'
              '    const/4 v13, 0x0\n'
              '\n'
              '    const/4 v14, 0x0\n'
              '\n'
              '    move-object v10, v1\n'
              '\n'
              '    invoke-direct/range {v10 .. v16}, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;-><init>(IILandroid/util/SparseArray;ZILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '\n'
              '    invoke-interface {v0, v1}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    return-object v0\n'
              '.end method\n'
              '\n'
              '.method public final l()Ljava/util/List;',
              'SettingItemViewModel.k(): add Grant Root Access button item (contentType=0x64)'

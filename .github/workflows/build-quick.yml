                  '    invoke-static {p0}, Lapp/revanced/extension/gamehub/GogLaunchHelper;->checkPendingLaunch(Landroid/app/Activity;)V\n'
                  '\n'
                  '    # BannerHub Lite: fire EditImportedGameInfoDialog for Amazon installs\n'
                  '    invoke-static {p0}, Lapp/revanced/extension/gamehub/AmazonLaunchHelper;->checkPendingLaunch(Landroid/app/Activity;)V\n'
                  '\n'
                  '    # BannerHub Lite: fire EditImportedGameInfoDialog for Epic installs\n'
                  '    invoke-static {p0}, Lapp/revanced/extension/gamehub/EpicLaunchHelper;->checkPendingLaunch(Landroid/app/Activity;)V\n'
                  '\n'
                  '    const/4 v0, 0x1\n'
                  '\n'
                  '    iput-boolean v0, p0, Lcom/xj/landscape/launcher/ui/main/LandscapeLauncherMainActivity;->i:Z\n'
              ),
              'LandscapeLauncherMainActivity.onResume(): GOG + Amazon + Epic pending launch checks'
          )

          print("\nAll patches applied successfully.")
          PYEOF

      - name: Apply resource patches
        run: |
          cp -r patches/. apktool_out/
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' apktool_out/res/values/public.xml || true

      - name: Patch package name and label
        run: |
          # Pre-release builds use banner.hub.lite so they coexist with any stable install
          sed -i 's/gamehub\.lite/banner.hub.lite/g' apktool_out/AndroidManifest.xml
          sed -i 's/android:label="@string\/app_name"/android:label="BannerHub Lite"/' apktool_out/AndroidManifest.xml

      - name: Rebuild APK
        run: |
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk
          echo "Rebuild complete: $(du -sh rebuilt-unsigned.apk | cut -f1)"

      - name: Compile and inject extension dex
        run: |
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes extension/*.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_dex \
            $(find ext_classes -name "*.class")
          cp ext_dex/classes.dex classes11.dex
          zip -j rebuilt-unsigned.apk classes11.dex

      - name: Zipalign and sign
        run: |
          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner sign \
            --key testkey.pk8 --cert testkey.x509.pem \
            --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true \
            --out "Bannerhub-Lite-${GITHUB_REF_NAME}-Normal.apk" \
            rebuilt-aligned.apk
          echo "Signed: $(du -sh "Bannerhub-Lite-${GITHUB_REF_NAME}-Normal.apk" | cut -f1)"

      - name: Get tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Upload release
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          APK=$(ls Bannerhub-Lite-*.apk | head -1)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "BannerHub Lite $TAG" --prerelease "$APK"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

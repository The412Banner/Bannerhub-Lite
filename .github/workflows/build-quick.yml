                  '\n'
                  '    iput-boolean v0, p0, Lcom/xj/landscape/launcher/ui/main/LandscapeLauncherMainActivity;->i:Z\n'
              ),
              (
                  '    invoke-super {p0}, Lcom/xj/base/base/activity/BaseVmActivity;->onResume()V\n'
                  '\n'

name: Build APK (Quick — Pre-release)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-pre*'
      - 'v*-beta*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download base APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out -f

      - name: Patch versionName
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^  versionName: .*/  versionName: '$TAG'/" apktool_out/apktool.yml
          grep versionName apktool_out/apktool.yml

      - name: Apply all patches
        run: |
          python3 << 'PYEOF'
          import sys, re

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          patch(
              'apktool_out/AndroidManifest.xml',
              '</application>',
              '    <activity android:name="app.revanced.extension.gamehub.ComponentManagerActivity"'
              ' android:label="Components" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.ComponentDownloadActivity"'
              ' android:label="Download Components" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.GogMainActivity"'
              ' android:label="GOG Games" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.GogLoginActivity"'
              ' android:label="GOG Login" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.GogGamesActivity"'
              ' android:label="GOG Library" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.AmazonMainActivity"'
              ' android:label="Amazon Games" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.AmazonLoginActivity"'
              ' android:label="Amazon Login" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.AmazonGamesActivity"'
              ' android:label="Amazon Library" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.EpicMainActivity"'
              ' android:label="Epic Games" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.EpicLoginActivity"'
              ' android:label="Epic Login" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n'
              '    <activity android:name="app.revanced.extension.gamehub.EpicGamesActivity"'
              ' android:label="Epic Library" android:exported="false"'
              ' android:screenOrientation="sensorLandscape" />\n    </application>',
              'manifest: register activities'
          )
          patch(
              'apktool_out/AndroidManifest.xml',
              '    </queries>',
              '        <package android:name="com.banner.inject" />\n    </queries>',
              'manifest: add BCI to queries'
          )
          patch(
              'apktool_out/res/values/strings.xml',
              '<string name="llauncher_main_page_title_my">Dashboard</string>',
              '<string name="llauncher_main_page_title_my">My Games</string>',
              'strings.xml: My Games rename'
          )
          patch(
              'apktool_out/res/values/ids.xml',
              '</resources>',
              '    <item type="id" name="iv_bci_launcher" />\n'
              '    <item type="id" name="switch_sustained_perf" />\n'
              '    <item type="id" name="switch_max_adreno_clocks" />\n'
              '</resources>',
              'ids.xml: add BCI + perf switch IDs'
          )
          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog.smali',
              (
                  '    if-eqz v3, :cond_1\n\n'
                  '    iget-object v4, v0, Lcom/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog;->m:Ljava/util/List;\n\n'
                  '    invoke-static {v3, v4}, Lcom/xj/common/view/adapter/MultiViewHolderAdapterKt;->f(Landroidx/recyclerview/widget/RecyclerView$Adapter;Ljava/util/List;)V\n'
              ),
              (
                  '    if-eqz v3, :cond_1\n\n'
                  '    iget-object v4, v0, Lcom/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog;->m:Ljava/util/List;\n'
                  '    invoke-static {v0, v4}, Lapp/revanced/extension/gamehub/ComponentManagerHelper;->addComponentsMenuItem(Ljava/lang/Object;Ljava/util/List;)V\n\n'
                  '    iget-object v4, v0, Lcom/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog;->m:Ljava/util/List;\n\n'
                  '    invoke-static {v3, v4}, Lcom/xj/common/view/adapter/MultiViewHolderAdapterKt;->f(Landroidx/recyclerview/widget/RecyclerView$Adapter;Ljava/util/List;)V\n'
              ),
              'HomeLeftMenuDialog.Z0(): addComponentsMenuItem injection'
          )
          inj = (
              '    iget-object v0, p0, Lcom/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog$init$1$9$2;->a:Lcom/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog;\n'
              '    iget-object v1, p0, Lcom/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog$init$1$9$2;->b:Landroidx/fragment/app/FragmentActivity;\n'
              '    invoke-static {v0, p1, v1}, Lapp/revanced/extension/gamehub/ComponentManagerHelper;->handleMenuItemClick(Ljava/lang/Object;Ljava/lang/Object;Landroid/app/Activity;)Z\n'
              '    move-result v0\n'
              '    if-eqz v0, :cond_bh_not_handled\n'
              '    return-void\n'
              '    :cond_bh_not_handled\n'
          )
          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/ui/menu/HomeLeftMenuDialog$init$1$9$2.smali',
              '    const-string v0, "entity"\n',
              inj + '    const-string v0, "entity"\n',
              'HomeLeftMenuDialog$init$1$9$2: click intercept injection'
          )
          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/ui/main/LandscapeLauncherMainActivity.smali',
              (
                  '    invoke-virtual/range {p0 .. p0}, Lcom/xj/landscape/launcher/ui/main/LandscapeLauncherMainActivity;->X2()V\n'
                  '\n'
                  '    return-void\n'
                  '.end method\n'
                  '\n'
                  '.method public final j3()V\n'
              ),
              (
                  '    invoke-virtual/range {p0 .. p0}, Lcom/xj/landscape/launcher/ui/main/LandscapeLauncherMainActivity;->X2()V\n'
                  '\n'
                  '    invoke-static/range {p0 .. p0}, Lapp/revanced/extension/gamehub/ComponentManagerHelper;->setupBciButton(Landroid/app/Activity;)V\n'
                  '\n'
                  '    return-void\n'
                  '.end method\n'
                  '\n'
                  '.method public final j3()V\n'
              ),
              'LandscapeLauncherMainActivity.initView(): setupBciButton injection'
          )
          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/launcher/strategy/SteamGameByPcEmuLaunchStrategy$launch$1$3.smali',
              (
                  '    invoke-interface {p1}, Lcom/xj/common/service/ISteamGameService;->l()Z\n'
                  '\n'
                  '    move-result v1\n'
                  '\n'
                  '    if-nez v1, :cond_8\n'
              ),
              (
                  '    invoke-interface {p1}, Lcom/xj/common/service/ISteamGameService;->l()Z\n'
                  '\n'
                  '    move-result v1\n'
                  '\n'
                  '    # BannerHub Lite patch: if not logged in but offline, skip login screen\n'
                  '    if-nez v1, :cond_8\n'
                  '    invoke-static {}, Lcom/blankj/utilcode/util/NetworkUtils;->r()Z\n'
                  '    move-result v1\n'
                  '    if-eqz v1, :cond_8\n'
              ),
              'SteamGameByPcEmuLaunchStrategy: offline Steam skip injection'
          )

          patch(
              'apktool_out/smali_classes4/com/xj/winemu/settings/GameSettingViewModel$fetchList$1.smali',
              (
                  '    iget-object v0, v7, Lcom/xj/winemu/settings/GameSettingViewModel$fetchList$1;'
                  '->$result:Lcom/xj/common/data/model/CommResultEntity;\n\n'
                  '    invoke-virtual {v0, v13}, Lcom/xj/common/data/model/CommResultEntity;->setData(Ljava/lang/Object;)V\n'
              ),
              (
                  '    iget v0, v7, Lcom/xj/winemu/settings/GameSettingViewModel$fetchList$1;->$contentType:I\n'
                  '    invoke-static {v13, v0}, Lapp/revanced/extension/gamehub/ComponentInjectorHelper;'
                  '->appendLocalComponents(Ljava/util/List;I)V\n\n'
                  '    iget-object v0, v7, Lcom/xj/winemu/settings/GameSettingViewModel$fetchList$1;'
                  '->$result:Lcom/xj/common/data/model/CommResultEntity;\n\n'
                  '    invoke-virtual {v0, v13}, Lcom/xj/common/data/model/CommResultEntity;->setData(Ljava/lang/Object;)V\n'
              ),
              'GameSettingViewModel$fetchList$1: appendLocalComponents injection'
          )

          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/launcher/'
              'LauncherHelper$fetchStartTypeInfoAndSwitchModeInternal$2$1.smali',
              (
                  '    :goto_9\n'
                  '    invoke-virtual {v0}, Ljava/lang/Throwable;->printStackTrace()V\n'
                  '\n'
                  '    instance-of v0, v0, Lcom/drake/net/exception/NetUnknownHostException;\n'
                  '\n'
                  '    if-eqz v0, :cond_14\n'
                  '\n'
                  '    invoke-static {v13}, Lkotlin/coroutines/jvm/internal/Boxing;->a(Z)Ljava/lang/Boolean;\n'
                  '\n'
                  '    move-result-object v0\n'
                  '\n'
                  '    return-object v0\n'
              ),
              (
                  '    :goto_9\n'
                  '    invoke-virtual {v0}, Ljava/lang/Throwable;->printStackTrace()V\n'
                  '\n'
                  '    # BannerHub Lite: API 404/ConvertException -> proceed with current launch settings\n'
                  '    invoke-static {v13}, Lkotlin/coroutines/jvm/internal/Boxing;->a(Z)Ljava/lang/Boolean;\n'
                  '\n'
                  '    move-result-object v0\n'
                  '\n'
                  '    return-object v0\n'
              ),
              'LauncherHelper: API error -> proceed with launch defaults instead of blocking'
          )

          # Patch 9: EnvironmentController.d() — use stored bitmask directly for CPU affinity
          patch(
              'apktool_out/smali_classes4/com/winemu/core/controller/EnvironmentController.smali',
              (
                  '    sget-object v0, Lcom/winemu/core/utils/CpuInfoCollector;->a:Lcom/winemu/core/utils/CpuInfoCollector;\n'
                  '\n'
                  '    invoke-virtual {v0}, Lcom/winemu/core/utils/CpuInfoCollector;->b()I\n'
                  '\n'
                  '    move-result v0\n'
                  '\n'
                  '    iget-object v1, p0, Lcom/winemu/core/controller/EnvironmentController;->b:Lcom/winemu/openapi/Config;\n'
                  '\n'
                  '    invoke-virtual {v1}, Lcom/winemu/openapi/Config;->x()I\n'
                  '\n'
                  '    move-result v1\n'
                  '\n'
                  '    sub-int/2addr v0, v1\n'
                  '\n'
                  '    if-lez v0, :cond_0\n'
                  '\n'
                  '    const/4 v1, 0x1\n'
                  '\n'
                  '    shl-int v0, v1, v0\n'
                  '\n'
                  '    sub-int/2addr v0, v1\n'
                  '\n'
                  '    not-int v0, v0\n'
                  '\n'
                  '    iget-object v1, p0, Lcom/winemu/core/controller/EnvironmentController;->f:Lcom/winemu/core/utils/EnvVars;\n'
              ),
              (
                  '    # BannerHub Lite: use stored bitmask directly for CPU affinity (0 = no limit)\n'
                  '    iget-object v1, p0, Lcom/winemu/core/controller/EnvironmentController;->f:Lcom/winemu/core/utils/EnvVars;\n'
              ),
              'EnvironmentController.d(): CPU affinity bitmask direct use'
          )

          # Patch 10: PcGameSettingOperations.F() — replace count-based CPU list with bitmask presets
          _CTOR = (
              'Lcom/xj/winemu/bean/DialogSettingListItemEntity;-><init>'
              '(IIZLjava/lang/String;Ljava/lang/String;IILjava/lang/String;ILjava/lang/String;'
              'JLjava/lang/String;Ljava/lang/String;Ljava/lang/String;ILjava/lang/String;II'
              'Lcom/xj/winemu/api/bean/EnvLayerEntity;ZII'
              'Lkotlin/jvm/internal/DefaultConstructorMarker;)V'
          )
          def _cpu_entry(id_const, label):
              cond = f'cond_bh_{label.replace(" ", "_").replace("(","").replace(")","").replace("-","_")}'
              return (
                  f'    const/16 v9, {id_const}\n' if int(id_const, 16) > 7 else f'    const/4 v9, {id_const}\n',
                  cond
              )
          _new_F = (
              '    # BannerHub Lite: bitmask-based CPU core selector\n'
              '    # id = bitmask passed to WINEMU_CPU_AFFINITY. 0 = No Limit.\n'
              '    const/4 v10, 0x0\n    const/4 v13, 0x0\n    const/4 v14, 0x0\n    const/4 v15, 0x0\n'
              '    const/16 v16, 0x0\n    const/16 v17, 0x0\n    const/16 v18, 0x0\n'
              '    const-wide/16 v19, 0x0\n'
              '    const/16 v21, 0x0\n    const/16 v22, 0x0\n    const/16 v23, 0x0\n    const/16 v24, 0x0\n'
              '    const/16 v25, 0x0\n    const/16 v26, 0x0\n    const/16 v27, 0x0\n    const/16 v28, 0x0\n'
              '    const/16 v29, 0x0\n    const/16 v30, 0x0\n'
              '    const v31, 0x1ffff2\n    const/16 v32, 0x0\n'
          )
          _entries = [
              ('0x0',  'No Limit',             'nl'),
              ('0xf0', 'Cores 4-7 (Performance)', 'p47'),
              ('0xf',  'Cores 0-3 (Efficiency)',  'e03'),
              ('0x1',  'Core 0',               'c0'),
              ('0x2',  'Core 1',               'c1'),
              ('0x4',  'Core 2',               'c2'),
              ('0x8',  'Core 3',               'c3'),
              ('0x10', 'Core 4',               'c4'),
              ('0x20', 'Core 5',               'c5'),
              ('0x40', 'Core 6',               'c6'),
              ('0x80', 'Core 7 (Prime)',        'c7'),
          ]
          for hex_id, name, tag in _entries:
              iid = int(hex_id, 16)
              id_ins = f'    const/4 v9, {hex_id}\n' if iid < 8 else f'    const/16 v9, {hex_id}\n'
              _new_F += (
                  f'    # ---- {name} ----\n'
                  + id_ins +
                  f'    if-nez v0, :cond_bh_{tag}_ns\n' if iid == 0 else
                  id_ins + f'    if-ne v0, v9, :cond_bh_{tag}_ns\n'
              )
              _new_F += (
                  f'    const/4 v11, 0x1\n'
                  f'    goto :goto_bh_{tag}\n'
                  f'    :cond_bh_{tag}_ns\n'
                  f'    const/4 v11, 0x0\n'
                  f'    :goto_bh_{tag}\n'
                  f'    const-string v12, "{name}"\n'
                  f'    new-instance v8, Lcom/xj/winemu/bean/DialogSettingListItemEntity;\n'
                  f'    invoke-direct/range {{v8 .. v32}}, {_CTOR}\n'
                  f'    invoke-interface {{v4, v8}}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              )
          _new_F += '    return-object v4\n'
          pcg = 'apktool_out/smali_classes4/com/xj/winemu/settings/PcGameSettingOperations.smali'
          _content = open(pcg, encoding='utf-8').read()
          _pat = (r'    sget-object v5, Lcom/winemu/core/utils/CpuInfoCollector;'
                  r'->a:Lcom/winemu/core/utils/CpuInfoCollector;.*?    :cond_2\n    return-object v4\n')
          if len(re.findall(_pat, _content, flags=re.DOTALL)) != 1:
              print('ERROR: F() CPU list pattern not found uniquely'); sys.exit(1)
          _content = re.sub(_pat, _new_F, _content, count=1, flags=re.DOTALL)
          open(pcg, 'w', encoding='utf-8').write(_content)
          print('OK: PcGameSettingOperations.F(): bitmask CPU list')

          # Patch 11: PcGameSettingOperations.I() — bitmask display label
          patch(
              pcg,
              (
                  '    if-nez p1, :cond_0\n'
                  '\n'
                  '    invoke-static {}, Lcom/blankj/utilcode/util/Utils;->a()Landroid/app/Application;\n'
                  '\n'
                  '    move-result-object p1\n'
                  '\n'
                  '    sget v0, Lcom/xj/language/R$string;->pc_cc_cpu_core_no_limit:I\n'
                  '\n'
                  '    invoke-virtual {p1, v0}, Landroid/content/Context;->getString(I)Ljava/lang/String;\n'
                  '\n'
                  '    move-result-object p1\n'
                  '\n'
                  '    invoke-static {p1}, Lkotlin/jvm/internal/Intrinsics;->d(Ljava/lang/Object;)V\n'
                  '\n'
                  '    goto :goto_0\n'
                  '\n'
                  '    :cond_0\n'
                  '    invoke-static {}, Lcom/blankj/utilcode/util/Utils;->a()Landroid/app/Application;\n'
                  '\n'
                  '    move-result-object v0\n'
                  '\n'
                  '    sget v1, Lcom/xj/language/R$string;->pc_cc_cpu_core:I\n'
                  '\n'
                  '    invoke-virtual {v0, v1}, Landroid/content/Context;->getString(I)Ljava/lang/String;\n'
                  '\n'
                  '    move-result-object v0\n'
                  '\n'
                  '    const-string v1, "getString(...)"\n'
                  '\n'
                  '    invoke-static {v0, v1}, Lkotlin/jvm/internal/Intrinsics;->f(Ljava/lang/Object;Ljava/lang/String;)V\n'
                  '\n'
                  '    invoke-static {p1}, Ljava/lang/Integer;->valueOf(I)Ljava/lang/Integer;\n'
                  '\n'
                  '    move-result-object p1\n'
                  '\n'
                  '    filled-new-array {p1}, [Ljava/lang/Object;\n'
                  '\n'
                  '    move-result-object p1\n'
                  '\n'
                  '    const/4 v1, 0x1\n'
                  '\n'
                  '    invoke-static {p1, v1}, Ljava/util/Arrays;->copyOf([Ljava/lang/Object;I)[Ljava/lang/Object;\n'
                  '\n'
                  '    move-result-object p1\n'
                  '\n'
                  '    invoke-static {v0, p1}, Ljava/lang/String;->format(Ljava/lang/String;[Ljava/lang/Object;)Ljava/lang/String;\n'
                  '\n'
                  '    move-result-object p1\n'
                  '\n'
                  '    const-string v0, "format(...)"\n'
                  '\n'
                  '    invoke-static {p1, v0}, Lkotlin/jvm/internal/Intrinsics;->f(Ljava/lang/Object;Ljava/lang/String;)V\n'
                  '\n'
                  '    :goto_0\n'
                  '    return-object p1\n'
                  '.end method\n'
                  '\n'
                  '.method public final I0(Lkotlin/coroutines/Continuation;)Ljava/lang/Object;\n'
              ),
              (
                  '    # BannerHub Lite: bitmask display label for CPU affinity setting\n'
                  '    if-nez p1, :cond_bh_nz\n'
                  '    const-string p1, "No Limit"\n'
                  '    return-object p1\n'
                  '    :cond_bh_nz\n'
                  '    const/16 v0, 0xf0\n'
                  '    if-ne p1, v0, :cond_bh_p47\n'
                  '    const-string p1, "Cores 4-7 (Performance)"\n'
                  '    return-object p1\n'
                  '    :cond_bh_p47\n'
                  '    const/16 v0, 0xf\n'
                  '    if-ne p1, v0, :cond_bh_e03\n'
                  '    const-string p1, "Cores 0-3 (Efficiency)"\n'
                  '    return-object p1\n'
                  '    :cond_bh_e03\n'
                  '    const/4 v0, 0x1\n'
                  '    if-ne p1, v0, :cond_bh_c0\n'
                  '    const-string p1, "Core 0"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c0\n'
                  '    const/4 v0, 0x2\n'
                  '    if-ne p1, v0, :cond_bh_c1\n'
                  '    const-string p1, "Core 1"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c1\n'
                  '    const/4 v0, 0x4\n'
                  '    if-ne p1, v0, :cond_bh_c2\n'
                  '    const-string p1, "Core 2"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c2\n'
                  '    const/16 v0, 0x8\n'
                  '    if-ne p1, v0, :cond_bh_c3\n'
                  '    const-string p1, "Core 3"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c3\n'
                  '    const/16 v0, 0x10\n'
                  '    if-ne p1, v0, :cond_bh_c4\n'
                  '    const-string p1, "Core 4"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c4\n'
                  '    const/16 v0, 0x20\n'
                  '    if-ne p1, v0, :cond_bh_c5\n'
                  '    const-string p1, "Core 5"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c5\n'
                  '    const/16 v0, 0x40\n'
                  '    if-ne p1, v0, :cond_bh_c6\n'
                  '    const-string p1, "Core 6"\n'
                  '    return-object p1\n'
                  '    :cond_bh_c6\n'
                  '    const/16 v0, 0x80\n'
                  '    if-ne p1, v0, :goto_0\n'
                  '    const-string p1, "Core 7 (Prime)"\n'
                  '    return-object p1\n'
                  '    :goto_0\n'
                  '    # Custom combination — build "Core X + Core Y" label dynamically\n'
                  '    new-instance v0, Ljava/lang/StringBuilder;\n'

          # Patch 21: SettingBtnHolder.w() — handle click for contentType=0x64
          # Injected EARLY (right after getContentType move-result) while p2 is still a View reference.
          # Cannot inject at :cond_5 because by then p2 has been overwritten with an int (HID_TIPS const).
          # Also avoids type-merge conflict at :goto_0 by returning directly rather than jumping to it.
          patch(
              'apktool_out/smali_classes5/com/xj/landscape/launcher/ui/setting/holder/SettingBtnHolder.smali',
              '    move-result p0\n'
